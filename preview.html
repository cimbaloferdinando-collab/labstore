<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LupoLab AP · v5</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --accent:   #1a2f5e;
  --accent2:  #2563eb;
  --accent-hi:rgba(255,255,255,.15);
  --bg:       #f0f2f7;
  --surface:  #ffffff;
  --border:   #e2e8f0;
  --border2:  #cbd5e1;
  --text:     #0f172a;
  --text2:    #374151;
  --text3:    #6b7280;
  --text4:    #b0bec5;
  --green:    #059669; --green-bg:#ecfdf5; --green-bd:#a7f3d0;
  --red:      #dc2626; --red-bg:  #fef2f2; --red-bd:  #fca5a5;
  --yellow:   #d97706; --yellow-bg:#fffbeb;--yellow-bd:#fcd34d;
  --blue:     #2563eb; --blue-bg: #eff6ff; --blue-bd: #bfdbfe;
  --orange:   #ea580c; --orange-bg:#fff7ed;--orange-bd:#fed7aa;
  --purple:   #7c3aed; --purple-bg:#f5f3ff;--purple-bd:#ddd6fe;
  --teal:     #0891b2; --teal-bg: #ecfeff; --teal-bd: #a5f3fc;
  --r:6px; --r-sm:4px; --r-lg:10px;
  --sh-sm:0 1px 3px rgba(15,23,42,.08);
  --sh:    0 4px 12px rgba(15,23,42,.10);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{font-family:'DM Sans',sans-serif;font-size:14px;line-height:1.5;
  color:var(--text2);background:var(--bg);min-height:100vh;
  -webkit-font-smoothing:antialiased}
a{text-decoration:none;color:inherit}
button{font-family:inherit;cursor:pointer;border:none;background:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:99px}

/* LAYOUT */
.app{display:grid;grid-template-rows:52px 1fr;
  grid-template-columns:48px 1fr;min-height:100vh}

/* HEADER */
.hdr{grid-column:1/-1;grid-row:1;height:52px;
  background:var(--accent);display:flex;align-items:center;
  padding:0 14px 0 0;position:sticky;top:0;z-index:200;
  box-shadow:0 2px 8px rgba(15,23,42,.30)}
.hdr-logo{width:48px;height:52px;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;
  border-right:1px solid rgba(255,255,255,.10)}
.hdr-logo span{font-family:'Libre Baskerville',serif;font-size:20px;
  font-weight:700;color:#fff;letter-spacing:-.5px}
.hdr-brand{font-family:'Libre Baskerville',serif;font-size:14px;
  font-weight:700;color:#fff;padding:0 14px;white-space:nowrap;
  border-right:1px solid rgba(255,255,255,.12);margin-right:10px}
.hdr-brand span{font-size:10px;font-weight:400;opacity:.55;margin-left:4px}
.sync-chip{display:flex;align-items:center;gap:5px;padding:3px 10px;
  border-radius:999px;border:1px solid rgba(255,255,255,.16);
  background:rgba(255,255,255,.07);font-family:'DM Mono',monospace;
  font-size:10px;color:rgba(255,255,255,.70);cursor:pointer;white-space:nowrap}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--green);flex-shrink:0}
.hdr-gap{flex:1}
.hdr-btns{display:flex;align-items:center;gap:4px}
.hbtn{padding:5px 10px;border-radius:var(--r-sm);
  border:1px solid rgba(255,255,255,.18);background:rgba(255,255,255,.09);
  color:rgba(255,255,255,.88);font-size:11px;font-weight:500;
  transition:background .13s;white-space:nowrap}
.hbtn:hover{background:rgba(255,255,255,.20)}
.hbtn.primary{background:#fff;color:var(--accent);border-color:#fff;font-weight:600}
.hbtn.primary:hover{background:#e8f0fe}
.hbtn.pap-l{background:rgba(234,88,12,.25);border-color:rgba(234,88,12,.40);color:#fdba74}
.hbtn.pap-p{background:rgba(124,58,237,.25);border-color:rgba(124,58,237,.40);color:#c4b5fd}
.hdr-sep{width:1px;height:20px;background:rgba(255,255,255,.16);margin:0 2px}
.hdr-time{font-family:'DM Mono',monospace;font-size:11px;
  color:rgba(255,255,255,.45);padding:0 4px}
.fc-btn{width:30px;height:30px;border-radius:50%;background:rgba(255,255,255,.18);
  border:1px solid rgba(255,255,255,.28);color:#fff;font-size:11px;
  font-weight:700;display:flex;align-items:center;justify-content:center;
  cursor:pointer;flex-shrink:0;transition:background .13s}
.fc-btn:hover{background:rgba(255,255,255,.30)}

/* RAIL */
.rail{grid-column:1;grid-row:2;width:48px;background:var(--accent);
  display:flex;flex-direction:column;align-items:center;
  padding:8px 0;position:sticky;top:52px;
  height:calc(100vh - 52px);overflow-y:auto;scrollbar-width:none}
.rail::-webkit-scrollbar{display:none}
.rail-item{position:relative;width:100%;height:38px;display:flex;
  align-items:center;justify-content:center;font-size:15px;
  color:rgba(255,255,255,.55);cursor:pointer;
  transition:color .12s,background .12s;flex-shrink:0;user-select:none}
.rail-item:hover{background:rgba(255,255,255,.10);color:rgba(255,255,255,.90)}
.rail-item.active{background:var(--accent-hi);color:#fff}
.rail-item::after{content:attr(title);position:absolute;left:calc(100% + 8px);
  top:50%;transform:translateY(-50%);background:#0f172a;color:#fff;
  font-family:'DM Sans',sans-serif;font-size:11px;font-weight:500;
  padding:4px 9px;border-radius:var(--r-sm);white-space:nowrap;
  pointer-events:none;opacity:0;transition:opacity .12s;z-index:300;
  box-shadow:var(--sh-sm)}
.rail-item:hover::after{opacity:1}
.rail-badge{position:absolute;top:5px;right:5px;min-width:14px;height:14px;
  background:var(--red);color:#fff;border-radius:999px;font-size:8px;
  font-weight:700;display:flex;align-items:center;justify-content:center;
  padding:0 3px;pointer-events:none}
.rail-div{width:28px;height:1px;background:rgba(255,255,255,.12);margin:4px auto}
.rail-bottom{flex:1}
.rail-avatar{width:30px;height:30px;border-radius:50%;
  background:rgba(255,255,255,.18);border:1px solid rgba(255,255,255,.28);
  color:#fff;font-size:11px;font-weight:700;display:flex;
  align-items:center;justify-content:center;cursor:pointer;
  transition:background .12s;margin-bottom:8px}
.rail-avatar:hover{background:rgba(255,255,255,.30)}

/* MAIN */
.main{grid-column:2;grid-row:2;padding:22px 26px;
  overflow-y:auto;min-height:calc(100vh - 52px)}
.view{display:none}.view.active{display:block}
</style>
</head>
<body>
<div class="app">

  <header class="hdr">
    <div class="hdr-logo"><span>L</span></div>
    <div class="hdr-brand">LupoLab AP<span>· v5</span></div>
    <div class="sync-chip"><span class="sync-dot"></span>sync · <span id="sync-ts">29 apr 12:04</span></div>
    <div class="hdr-gap"></div>
    <div class="hdr-btns">
      <button class="hbtn">📷 Scan</button>
      <button class="hbtn">🔍 Cerca</button>
      <button class="hbtn primary">＋ Campione</button>
      <button class="hbtn pap-l">＋ Pap L</button>
      <button class="hbtn pap-p">＋ Pap Priv.</button>
      <div class="hdr-sep"></div>
      <button class="hbtn">⬆ Carico</button>
      <button class="hbtn">⬇ Scarico</button>
      <button class="hbtn">📷 DDT</button>
      <button class="hbtn">＋ Prodotto</button>
      <div class="hdr-sep"></div>
      <span class="hdr-time" id="live-time">--:--</span>
      <div class="hdr-sep"></div>
      <div class="fc-btn" title="Menu FC">FC</div>
    </div>
  </header>

  <aside class="rail" id="rail">
    <div class="rail-item active" data-view="home" title="Dashboard">⌂</div>
    <div class="rail-div"></div>
    <div class="rail-item" data-view="campioni"     title="Campioni">⌁</div>
    <div class="rail-item" data-view="processatore" title="Processatore">◎</div>
    <div class="rail-item" data-view="coloratore"   title="Coloratore">◉</div>
    <div class="rail-div"></div>
    <div class="rail-item" data-view="inventario"   title="Inventario">▦</div>
    <div class="rail-item" data-view="movimenti"    title="Movimenti">↕</div>
    <div class="rail-item" data-view="allerte"      title="Allerte" style="position:relative">
      !<span class="rail-badge">7</span>
    </div>
    <div class="rail-item" data-view="ordini"       title="Ordini" style="position:relative">
      ↻<span class="rail-badge">3</span>
    </div>
    <div class="rail-item" data-view="arch-ordini"  title="Arch. Ordini">🗂</div>
    <div class="rail-item" data-view="schede"       title="Schede Tecniche">📋</div>
    <div class="rail-div"></div>
    <div class="rail-item" data-view="rifiuti"      title="Rifiuti">✕</div>
    <div class="rail-item" data-view="report"       title="Report">⊞</div>
    <div class="rail-bottom"></div>
    <div class="rail-avatar" title="Menu sistema">FC</div>
  </aside>

  <main class="main" id="main">
    <div class="view active" data-view="home" id="view-home">
      <!-- contenuto aggiunto in T2 -->
    </div>
  </main>

</div>
<script>
function updateClock(){
  const t=new Date(),hm=t.toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  const el=document.getElementById('live-time');if(el)el.textContent=hm;
}
updateClock();setInterval(updateClock,30000);

document.querySelectorAll('.rail-item[data-view]').forEach(r=>{
  r.addEventListener('click',()=>{
    document.querySelectorAll('.rail-item').forEach(x=>x.classList.remove('active'));
    r.classList.add('active');
    document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));
    const t=document.querySelector(`[data-view="${r.dataset.view}"].view`);
    if(t)t.classList.add('active');
  });
});
</script>
</body>
</html>
